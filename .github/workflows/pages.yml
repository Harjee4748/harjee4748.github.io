name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A4A5AD: ${{ secrets.A4A5AD }}
          B13E59: ${{ secrets.B13E59 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A4A5AD', '')
          sec_b = os.environ.get('B13E59', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 721eaaaaca30a37b3ceeb4f55ceec11e64 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 0bdb085de644634c994ebbce0ae370f106d9328ecd3772 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
