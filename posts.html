---
layout: default
permalink: /posts/
title: Posts
---
<h1>Posts</h1>

{% if site.posts.size > 0 %}
<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="empty">No posts yet — check back soon.</p>
{% endif %}
